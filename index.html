<!DOCTYPE html>
<html lang="en">
<head>
    <title>Second Nature Signage</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/vehicle-dashboard.css">
</head>
<body>
    <main class="signage-shell">
        <header class="signage-header">
            <div class="brand-block">
                <p class="eyebrow">Second Nature</p>
                <h1>Vehicle Dashboard</h1>
            </div>
            <time class="current-clock" id="currentClock"></time>
            <button class="refresh-btn" id="refreshBtn" type="button">Refresh</button>
        </header>

        <section id="vehicleDashboard" class="dashboard-panel" aria-live="polite"></section>
    </main>

    <script src="/vehicle-dashboard.js" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            window.SecondNatureVehicleDashboard.mount({
                root: document.getElementById('vehicleDashboard'),
                refreshButton: document.getElementById('refreshBtn'),
                clock: document.getElementById('currentClock')
            });
        });
    </script>
</body>
</html>
